<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="파트너스 교육관 - 성공적인 영업을 위한 교육 플랫폼">
    <title>파트너스 교육관</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind CSS & Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: {
                // 부모 style.css와의 충돌을 막기 위해 preflight 비활성화
                preflight: false,
            },
            theme: {
                extend: {
                    colors: {
                        primary: '#F37321', // Orange
                        primaryHover: '#d96316',
                        secondary: '#1e293b', // Dark Blue/Gray
                        brandNavy: '#1B1F3B', // Deep Navy for Left Panel
                    },
                    animation: {
                        fadeIn: "fadeIn 0.5s ease-out forwards",
                    },
                    keyframes: {
                        fadeIn: {
                            "0%": { opacity: "0", transform: "translateY(10px)" },
                            "100%": { opacity: "1", transform: "translateY(0)" },
                        },
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        /* Tailwind preflight가 꺼져있으므로 button, input 기본 스타일 약간 보완 (login screen용) */
        #login-screen {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        #login-screen input {
            box-sizing: border-box;
        }

        #login-screen input:focus {
            outline: none;
        }

        #login-screen button {
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <!-- 로딩 화면 -->

        <div class="loading-content">
            <div class="loading-text">파트너스본부</div>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- 로그인 화면 -->

        style="display: none;">

        <!-- Left Panel (Desktop Only) -->
        <div
            class="hidden md:flex md:w-1/2 bg-[#171B31] flex-col items-center justify-center p-12 text-center relative overflow-hidden text-white">

            <div class="absolute -top-32 -left-20 w-[450px] h-[450px] bg-[#3B262F] rounded-full"></div>

            <div class="z-10 flex flex-col items-center gap-12 animate-fadeIn relative">
                <div class="space-y-6">
                    <h1 class="text-[48px] font-bold tracking-tight">파트너스본부</h1>
                    <p class="text-gray-300 text-[18px] font-light leading-relaxed">
                        성공적인 영업을 위한 교육 플랫폼<br>
                        언제 어디서나 학습하고 성장하세요
                    </p>
                </div>

                <div class="flex flex-col gap-8 w-full max-w-[320px] text-left">
                    <div class="flex items-center gap-6">
                        <div
                            class="w-16 h-16 rounded-2xl bg-[#483038] flex items-center justify-center flex-shrink-0 text-3xl shadow-inner border border-white/5">
                            📺
                        </div>
                        <span class="font-medium text-gray-100 text-[18px] tracking-wide">다양한 교육 영상과 자료</span>
                    </div>
                    <div class="flex items-center gap-6">
                        <div
                            class="w-16 h-16 rounded-2xl bg-[#483038] flex items-center justify-center flex-shrink-0 text-3xl shadow-inner border border-white/5">

                        </div>

                    </div>
                    <div class="flex items-center gap-6">
                        <div
                            class="w-16 h-16 rounded-2xl bg-[#483038] flex items-center justify-center flex-shrink-0 text-3xl shadow-inner border border-white/5">

                        </div>
                        <span class="font-medium text-gray-100 text-[18px] tracking-wide">동료들과 함께하는 학습</span>
                    </div>

            </div>
        </div>

                    <!-- Main Title -->

                        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">파트너스 <span
                                class="text-primary">교육관</span></h2>
                        <p class="text-gray-400 text-sm">계정 정보를 입력해 주세요</p>
                    </div>

                    <!-- Login Form -->
                    <form id="login-form" class="space-y-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700 text-left">사번</label>
                            <input type="text" id="employee-id" placeholder="사번을 입력하세요"
                                class="w-full px-4 py-3.5 rounded-lg border border-gray-200 bg-white focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition duration-200 placeholder-gray-400 text-center"
                                autocomplete="username" required>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700 text-left">비밀번호</label>
                            <input type="password" id="password" placeholder="비밀번호를 입력하세요"
                                class="w-full px-4 py-3.5 rounded-lg border border-gray-200 bg-white focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition duration-200 placeholder-gray-400 text-center"
                                autocomplete="current-password" required>
                        </div>

                        <input type="checkbox" id="remember-me" style="display: none;">

                        <button type="submit" id="login-btn"
                            class="w-full bg-primary text-white font-bold py-4 rounded-lg hover:bg-primaryHover hover:shadow-lg transition duration-200 text-lg flex justify-center items-center">
                            <span class="btn-text">로그인</span>
                            <span class="btn-loading" style="display: none;">로그인 중...</span>
                        </button>

                        <div id="login-error" class="bg-red-100 text-red-600 p-3 mt-4 rounded-lg text-sm text-center"
                            style="display: none;"></div>
                    </form>

                    <div class="pt-4 text-center">
                        <p class="text-xs text-gray-400 mb-2">도움이 필요하신가요?</p>
                        <p class="text-xs text-gray-400">로그인에 문제가 있으시면 관리자에게 문의하세요</p>

                    </div>

                    <button class="sidebar-action-btn logout-action-btn" id="logout-btn" title="로그아웃">🔓 로그아웃</button>
                </div>

        <main class="main-content">
            <!-- 헤더 -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menu-toggle">☰</button>
